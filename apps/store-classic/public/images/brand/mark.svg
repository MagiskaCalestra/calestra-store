<!-- Calestra Star – sharp 8-point (mark.svg) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- varm stjärn-ton + diskret glow -->
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff7db"/>
      <stop offset="55%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#ffd66b"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,225,140,.50)"/>
      <stop offset="80%" stop-color="rgba(255,225,140,.07)"/>
      <stop offset="100%" stop-color="rgba(255,225,140,0)"/>
    </radialGradient>
  </defs>

  <!-- Halo (syns mest i dark mode) -->
  <circle cx="32" cy="32" r="22" fill="url(#halo)"/>

  <!-- 8 trianglar (tapered rays), långa N/S -->
  <g fill="url(#g)" stroke="#fff7db" stroke-width="0.25" stroke-linejoin="miter">
    <!-- N (lång) -->
    <polygon points="32,5 34.2,24 29.8,24"/>
    <!-- S (lång) -->
    <polygon points="32,59 29.8,40 34.2,40"/>
    <!-- E (mellan) -->
    <polygon points="59,32 40,34.2 40,29.8"/>
    <!-- W (mellan) -->
    <polygon points="5,32 24,29.8 24,34.2"/>

    <!-- NE (kort) -->
    <polygon points="48.8,15.2 37.8,27.0 35.6,24.8"/>
    <!-- SE (kort) -->
    <polygon points="48.8,48.8 35.6,39.2 37.8,37.0"/>
    <!-- SW (kort) -->
    <polygon points="15.2,48.8 27.0,37.8 24.8,35.6"/>
    <!-- NW (kort) -->
    <polygon points="15.2,15.2 24.8,27.0 27.0,24.8"/>
  </g>
</svg>
